services:
  test_db:
    image: postgres:15.7
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: postgres
    hostname: localhost
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 2s
      timeout: 5s
      retries: 30

  test_s3:
    image: rustfs/rustfs:1.0.0-beta.6
    restart: always
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
    ports:
      - "9100:9000" # S3 API (decalé pour éviter les collisions locales)
