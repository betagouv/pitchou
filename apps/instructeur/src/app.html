    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
    <!-- 180×180 -->

    <link crossorigin="anonymous" rel="stylesheet" href="/style/custom-icons.css" />

    <script>
      if (!Set.prototype.difference) {
        Set.prototype.difference = function (otherSet) {
          if (!(otherSet instanceof Set)) {
            throw new TypeError("Argument must be a Set");
          }
          return new Set([...this].filter((elem) => !otherSet.has(elem)));
        };
      }
    </script>

    <!-- Matomo -->
    <script>
      var _paq = (window._paq = window._paq || []);
      // Site ID is set per deploy (staging / production). Empty in dev = no-op.
      // This only bootstraps the tracker; page views (initial + client-side SPA
      // navigations) are sent from the SvelteKit layout (afterNavigate).
      var matomoSiteId = "%sveltekit.env.PUBLIC_MATOMO_SITE_ID%";
      if (matomoSiteId) {
        _paq.push(["enableLinkTracking"]);
        (function () {
          var u = "https://stats.beta.gouv.fr/";
          _paq.push(["setTrackerUrl", u + "matomo.php"]);
          _paq.push(["setSiteId", matomoSiteId]);
          var d = document,
            g = d.createElement("script"),
            s = d.getElementsByTagName("script")[0];
          g.async = true;
          g.src = u + "matomo.js";
          s.parentNode.insertBefore(g, s);
        })();
      }
    </script>
    <!-- End Matomo Code -->

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <!-- https://www.systeme-de-design.gouv.fr/utilisation-et-organisation/developpeurs/api-javascript -->
    <script type="module" src="/docs/style/dsfr/dsfr.module.js"></script>
  </body>
</html>
