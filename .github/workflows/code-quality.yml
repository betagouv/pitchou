name: Code quality

on: [pull_request]

#on:
#  push:
#      branches:
#        - svelte-check-tower

jobs:
  type-check:
    name: Type check (tsc + reviewdog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run tsc and report to reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec just check-types 2>&1 \
            | reviewdog -f=tsc -reporter=github-pr-review -level=warning -filter-mode=file -fail-on-error=true

  svelte-check:
    name: Svelte check (svelte-check + reviewdog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run svelte-check and report to reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec svelte-check --output machine 2>&1 \
            | reviewdog \
                -efm='%n %tRROR "%f" %l:%c "%m"' \
                -efm='%n %tARNING "%f" %l:%c "%m"' \
                -efm='%-G%.%#' \
                -name=svelte-check \
                -reporter=github-pr-review \
                -level=warning \
                -filter-mode=file \
                -fail-on-error=true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec just build
