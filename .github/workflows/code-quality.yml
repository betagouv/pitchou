name: Code quality

on: [pull_request]

#on:
#  push:
#      branches:
#        - svelte-check-tower

permissions:
  contents: read

jobs:
  type-check:
    name: Type check (tsc + reviewdog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.21.0

      - name: Run tsc and report to reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          pnpm exec just check-types 2>&1 \
            | reviewdog -f=tsc -reporter=github-pr-review -level=warning -filter-mode=file -fail-on-error=true

  svelte-check:
    name: Svelte check (svelte-check + reviewdog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.21.0

      - name: Generate SvelteKit types (per app)
        run: pnpm --filter "./apps/*" exec svelte-kit sync

      - name: Run svelte-check and report to reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          pnpm --filter @pitchou/app-instructeur exec svelte-check --output machine 2>&1 \
            | reviewdog \
                -efm='%n %tRROR "%f" %l:%c "%m"' \
                -efm='%n %tARNING "%f" %l:%c "%m"' \
                -efm='%-G%.%#' \
                -name=svelte-check \
                -reporter=github-pr-review \
                -level=warning \
                -filter-mode=file \
                -fail-on-error=true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm exec just build
