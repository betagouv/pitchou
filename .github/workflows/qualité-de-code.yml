name: Qualité de code

on: [pull_request]

#on:
#  push:
#      branches:
#        - svelte-check-tower

jobs:
  tsc:
    name: Run tsc with reviewdog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run tsc and report to reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec tsc --noEmit 2>&1 \
            | reviewdog -f=tsc -reporter=github-pr-review -level=warning -filter-mode=file -fail-on-error=true

  svelte-check:
    name: Run svelte-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Run the svelte check action
      - name: Svelte Check
        uses: ghostdevv/svelte-check-action@v1.5
        with:
          # filterChanges: false
          failOnError: true

  build:
    name: Test pnpm run build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run build
