name: Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run unit tests
        run: pnpm exec just test-unit
        timeout-minutes: 5

  test-e2e:
    name: E2E tests (playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15.7
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dev"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      rustfs:
        image: rustfs/rustfs:1.0.0-beta.6
        env:
          RUSTFS_ACCESS_KEY: rustfsadmin
          RUSTFS_SECRET_KEY: rustfsadmin
        ports:
          - 9100:9000
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Install Playwright Browsers
        run: pnpm --filter @pitchou/app-instructeur exec playwright install --with-deps

      - name: Build the app
        run: pnpm exec just build

      - name: Run E2E tests
        run: pnpm exec just test-e2e
        timeout-minutes: 10

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 2
